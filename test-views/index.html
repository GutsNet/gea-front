<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GEA - Test Views</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #f3f4f6;
        color: #111827;
      }
      .app-shell {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }
      .topbar {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: center;
        margin-bottom: 20px;
      }
      .grid-layout {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 16px;
      }
      .panel {
        background: white;
        border: 1px solid #d1d5db;
        padding: 14px;
      }
      .span-12 { grid-column: span 12; }
      .span-4 { grid-column: span 4; }
      .span-5 { grid-column: span 5; }
      .span-7 { grid-column: span 7; }
      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
      }
      .kpi {
        border: 1px solid #d1d5db;
        padding: 12px;
        background: #f9fafb;
      }
      .table-grid {
        display: grid;
        gap: 8px;
      }
      .row {
        display: grid;
        grid-template-columns: 1.2fr 1fr 1fr 1fr;
        gap: 8px;
        border-bottom: 1px solid #e5e7eb;
        padding-bottom: 6px;
      }
      .label {
        font-size: 12px;
        font-weight: bold;
        text-transform: uppercase;
      }
      .btn {
        display: inline-block;
        padding: 8px 12px;
        border: 1px solid #111827;
        background: #ffffff;
        cursor: pointer;
      }
      @media (max-width: 900px) {
        .kpi-grid,
        .row,
        .grid-layout {
          grid-template-columns: 1fr;
        }
        .span-12,
        .span-4,
        .span-5,
        .span-7 { grid-column: span 1; }
      }
    </style>
  </head>
  <body>
    <div id="app" class="app-shell"></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
